<!DOCTYPE html>
<html lang="en">
<!--
    ops.debug.panel.html — Ops.Debug browser panel
    Developer-only utility. Register on a form in a collapsible section labeled "Debug".
    Remove the section from production forms — leave the web resource registered so it
    reappears when the section is restored.

    Dependencies (loaded from parent frame via Ops.* globals):
      parent.Ops.Debug — must be loaded in the parent form's web resource dependencies

    Form editor web resource name (suggested): ops_debugpanel
    Section height: ~160px
-->
<head>
<meta charset="utf-8">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Segoe UI, sans-serif; font-size: 12px; }

    body {
        background: transparent;
        padding: 6px 8px;
        opacity: 0.75;  /* low-visibility — not prominent in normal use */
    }

    body:hover { opacity: 1; }

    .toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 6px;
    }

    button {
        padding: 3px 10px;
        border: 1px solid #888;
        border-radius: 3px;
        background: #f4f4f4;
        cursor: pointer;
        font-size: 11px;
        color: #333;
    }

    button:hover { background: #e0e0e0; }

    .label {
        color: #666;
        font-size: 11px;
        user-select: none;
    }

    #log-preview {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: 'Consolas', monospace;
        font-size: 10px;
        padding: 4px 6px;
        border-radius: 3px;
        height: 80px;
        overflow-y: auto;
        white-space: pre;
        line-height: 1.4;
    }

    #status {
        color: #0078d4;
        font-size: 10px;
        margin-top: 4px;
        min-height: 14px;
    }
</style>
</head>
<body>

<div class="toolbar">
    <span class="label">⚙ DBG</span>
    <button onclick="copyLog()">Copy Log</button>
    <button onclick="printTable()">Table</button>
    <button onclick="clearLog()">Clear</button>
    <button onclick="toggleLevel()">Level: <span id="level-label">Info</span></button>
    <button onclick="refreshPreview()">Refresh</button>
</div>

<div id="log-preview">— log empty —</div>
<div id="status"></div>

<script>
    /* global parent */
    'use strict';

    var _verbose = false;

    function _debug() {
        try { return parent && parent.Ops && parent.Ops.Debug ? parent.Ops.Debug : null; }
        catch (e) { return null; }
    }

    function _setStatus(msg) {
        var el = document.getElementById('status');
        if (el) el.textContent = msg;
        setTimeout(function() { if (el) el.textContent = ''; }, 2500);
    }

    function copyLog() {
        var dbg = _debug();
        if (!dbg) { _setStatus('Ops.Debug not available on parent form.'); return; }
        dbg.copyToClipboard();
        _setStatus('Copied ' + dbg.getLog().length + ' entries to clipboard.');
        refreshPreview();
    }

    function printTable() {
        var dbg = _debug();
        if (!dbg) { _setStatus('Ops.Debug not available.'); return; }
        dbg.printTable();
        _setStatus('Printed to DevTools console (F12 → Console).');
    }

    function clearLog() {
        var dbg = _debug();
        if (!dbg) return;
        dbg.clearLog();
        document.getElementById('log-preview').textContent = '— log cleared —';
        _setStatus('Log cleared.');
    }

    function toggleLevel() {
        var dbg = _debug();
        if (!dbg) return;
        _verbose = !_verbose;
        dbg.setLevel(_verbose ? dbg.Level.Verbose : dbg.Level.Info);
        document.getElementById('level-label').textContent = _verbose ? 'Verbose' : 'Info';
        _setStatus('Level set to ' + (_verbose ? 'Verbose' : 'Info') + '.');
    }

    function refreshPreview() {
        var dbg = _debug();
        var el = document.getElementById('log-preview');
        if (!dbg) { el.textContent = 'Ops.Debug not found on parent frame.'; return; }
        var entries = dbg.getLog().slice(-20);  // last 20 entries
        if (entries.length === 0) { el.textContent = '— log empty —'; return; }
        el.textContent = entries.map(function(e) {
            return '[' + e.ts.slice(11, 23) + '] [' + e.level + '] ' + e.msg;
        }).join('\n');
        el.scrollTop = el.scrollHeight;
    }

    // Auto-refresh preview every 2 seconds while the panel is visible
    setInterval(refreshPreview, 2000);
    refreshPreview();
</script>
</body>
</html>
